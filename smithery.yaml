# Smithery configuration file: https://smithery.ai/docs/build/project-config

startCommand:
  type: stdio
  commandFunction:
    # A JS function that produces the CLI command based on the given config to start the MCP on stdio.
    |-
    (config) => ({ command: 'node', args: ['build/index.js'], env: { N8N_HOST: config.n8nHost, N8N_API_KEY: config.n8nApiKey } })
  configSchema:
    # JSON Schema defining the configuration options for the MCP.
    type: object
    required:
      - n8nHost
      - n8nApiKey
    properties:
      n8nHost:
        type: string
        description: Your n8n instance URL (e.g., https://your-n8n-instance.com)
      n8nApiKey:
        type: string
        description: Your n8n API key
  exampleConfig:
    n8nHost: https://example.n8n.io
    n8nApiKey: abcd1234efgh5678
